<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HadyPro - Content Creator & Streamer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>

        h1 {
    animation: glowPulse 2.5s ease-in-out infinite;
}

@keyframes glowPulse {
    0% {
        text-shadow: 
            0 0 8px rgba(255,255,255,0.6),
            0 0 20px rgba(170,0,255,0.4),
            0 0 30px rgba(170,0,255,0.2);
    }

    50% {
        text-shadow: 
            0 0 15px rgba(255,255,255,0.9),
            0 0 35px rgba(170,0,255,0.7),
            0 0 55px rgba(170,0,255,0.5);
    }

    100% {
        text-shadow: 
            0 0 8px rgba(255,255,255,0.6),
            0 0 20px rgba(170,0,255,0.4),
            0 0 30px rgba(170,0,255,0.2);
    }
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

       body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
    overflow: hidden;
    position: relative;
    padding: 100px 20px;
}

body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), 
                url('wallhaven.jpg') no-repeat center center/cover;
    z-index: -2;
    transition: all 0.4s ease;
}

body.light-mode::after {
    background: url('wallhaven.jpg') no-repeat center center/cover;
    filter: brightness(1.25) saturate(1.15);
}

        body.light-mode {
            background: url('wallhaven.jpg') no-repeat center center/cover;
            background-attachment: fixed;
            filter: brightness(1.2) saturate(1.15);
        }

      .controls {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 15px;
    z-index: 100;
    direction: ltr; 
}

#lang-btn, #theme-btn {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    min-width: 95px;
}

#lang-btn i, #theme-btn i {
    width: 18px;
    text-align: center;
    flex-shrink: 0;
}

#lang-text, #theme-text {
    width: 40px;
    text-align: center;
    display: inline-block;
}

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(170, 0, 255, 0.4);
            border-color: rgba(170, 0, 255, 0.8);
            box-shadow: 0 0 15px rgba(170, 0, 255, 0.5);
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(170, 0, 255, 0.15) 0%, transparent 70%); 
            animation: rotate 25s linear infinite; 
            z-index: -1;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 60px rgba(170, 0, 255, 0.3);
            margin-bottom: 25px;
            transition: all 0.4s ease;
            position: relative;
        }

        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(170, 0, 255, 0.6); 
            border-color: rgba(255, 255, 255, 0.4);
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3.8rem; 
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: lowercase; 
            letter-spacing: 5px; 
            color: #fff; 
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8), 
                0 0 20px rgba(255, 255, 255, 0.6),
                0 0 30px rgba(170, 0, 255, 0.7), 
                0 0 40px rgba(170, 0, 255, 0.5),
                0 0 50px rgba(170, 0, 255, 0.3);
            transition: text-shadow 0.3s ease;
        }
        
        h1:hover {
             text-shadow: 
                0 0 15px rgba(255, 255, 255, 1), 
                0 0 25px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(170, 0, 255, 0.9), 
                0 0 50px rgba(170, 0, 255, 0.7),
                0 0 60px rgba(170, 0, 255, 0.5);
        }

        .typing-container {
            height: 40px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

       .typing-text {
    font-size: 1.3rem;
    font-weight: 300;
    letter-spacing: 2px;
    color: #ccc; 
    border-right: 3px solid #fff;
    white-space: nowrap;
    overflow: hidden;
}
        @keyframes typing {
            0%   { width: 0; }
            50%  { width: 100%; }
            90%  { width: 100%; }
            100% { width: 0; }
        }

      @keyframes blink {
    50% { border-color: transparent; }
}

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

       .social-links a {
    position: relative;
    color: #fff;
    font-size: 26px;
    width: 62px;
    height: 62px;
    display: flex;
    align-items: center;
    justify-content: center;

    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 50%;

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    transition: all 0.35s ease;
    overflow: hidden;

    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
}
        .social-links a::before {
            content: attr(data-platform);
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 1px;
        }

.social-links a::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at center,
        rgba(255,255,255,0.15),
        transparent 70%);
    opacity: 0;
    transition: 0.3s ease;
}

        .social-links a:hover::before,
        .social-links a:hover::after {
    opacity: 1;
;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .social-links a:hover {
    transform: translateY(-6px) scale(1.12);
    border-color: rgba(255, 255, 255, 0.35);
}
   a[data-platform="KICK"]:hover {
    background: rgba(83, 252, 24, 0.15);
    box-shadow: 0 0 25px rgba(83, 252, 24, 0.6);
    color: #53fc18;
}

a[data-platform="Facebook"]:hover {
    background: rgba(24, 119, 242, 0.15);
    box-shadow: 0 0 25px rgba(24, 119, 242, 0.6);
    color: #1877f2;
}

a[data-platform="Instagram"]:hover {
    background: rgba(220, 39, 67, 0.15);
    box-shadow: 0 0 30px rgba(220, 39, 67, 0.6);
}

a[data-platform="TikTok"]:hover {
    background: rgba(0, 0, 0, 0.25);
    box-shadow: 0 0 25px rgba(255, 0, 80, 0.5),
                0 0 25px rgba(0, 242, 234, 0.4);
}

a[data-platform="WhatsApp"]:hover {
    background: rgba(37, 211, 102, 0.15);
    box-shadow: 0 0 25px rgba(37, 211, 102, 0.6);
    color: #25d366;
}

a[data-platform="Discord"]:hover {
    background: rgba(88, 101, 242, 0.15);
    box-shadow: 0 0 25px rgba(88, 101, 242, 0.6);
    color: #5865f2;
}
        footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5); 
            letter-spacing: 1px;
            z-index: 50;
        }

        footer p { margin: 5px 0; }
        footer .developer { 
            color: rgba(255, 255, 255, 0.7); 
            font-weight: 600; 
            text-decoration: none; 
            transition: all 0.3s ease;
        }
        footer .developer:hover { 
            text-decoration: underline; 
            color: #fff;
            text-shadow: 0 0 10px rgba(170, 0, 255, 0.7);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; letter-spacing: 3px; }
            .profile-img { width: 130px; height: 130px; }
            .social-links { gap: 15px; }
            .social-links a { width: 50px; height: 50px; font-size: 22px; }
            .typing-text { font-size: 1rem; }
            footer { bottom: 15px; font-size: 0.75rem; }
            .controls { top: 10px; right: 10px; gap: 10px; }
            .control-btn { padding: 6px 12px; font-size: 0.8rem; }
        }

        

    </style>
</head>
